<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        .channel-card {
            background: #222; color: #fff; padding: 20px;
            margin: 10px; cursor: pointer; border-radius: 10px;
            text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="channel-card" onclick="sendToPlayer({
        'stream': 'https://ktvlive.online/stream/hls/ch1.m3u8',
        'userAgent': 'Mozilla/5.0...',
        'referer': '',
        'drm': ''
    })">
        beIN MAX 1
    </div>

    <script>
        function sendToPlayer(data) {
            // هذا الكود يتحدث مع الأندرويد مباشرة
            if (window.AndroidBridge) {
                AndroidBridge.openPlayer(JSON.stringify(data));
            } else {
                alert("التطبيق غير متصل!");
            }
        }
    </script>
</body>
</html>
