<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe 
        id="live-player"
        src="https://toneassertive.net/embed/cosjzd7el0" 
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <script>
        // حقن كود إضافي لمنع التحويل (Redirect)
        var iframe = document.getElementById('live-player');
        iframe.onload = function() {
            try {
                iframe.contentWindow.window.top = iframe.contentWindow.window.self;
            } catch (e) {
                console.log("Security policy blocked direct top-level override, but frame is loading.");
            }
        };
    </script>
</body>
</html>
