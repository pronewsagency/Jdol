<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Player</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@clappr/player@0.11.16/dist/clappr.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.11.16/dist/clappr.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100%; height: 100vh; }
        #btn-unmute {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px;
            cursor: pointer; border-radius: 5px; font-family: sans-serif;
            display: none; border: 1px solid #fff;
        }
        .stream-offline {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; text-align: center; z-index: 50;
        }
        .tb-col { display: flex; flex-direction: column; justify-content: center; height: 100%; }
    </style>
</head>
<body>

<div id="btn-unmute">انقر هنا لإلغاء كتم الصوت</div>

<div id="player"></div>

<div class="stream-offline">
    <div class="tb-col">
        <h2>البث متوقف حالياً</h2>
        <p>جاري إعادة المحاولة خلال <span class="counter">20</span> ثانية</p>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "p2p-media-loader-core": "https://cdn.jsdelivr.net/npm/p2p-media-loader-core@^2/dist/p2p-media-loader-core.es.min.js",
        "p2p-media-loader-hlsjs": "https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@^2/dist/p2p-media-loader-hlsjs.es.min.js"
    }
}
</script>

<script type="module">
    import { HlsJsP2PEngine } from "p2p-media-loader-hlsjs";

    var videoStarted = false;
    var WSreloadCounter = false;
    // رابط البث (يجب تحديثه إذا انتهت صلاحيته)
    var src = "https://jp4zhfst.04334746.net:8443/hls/cosjzd7el0.m3u8?s=c0iTdJEKwx8t1uOQ1YN-uA&e=1773723213";

    // إعداد محرك P2P لتحسين جودة البث وتقليل الضغط على السيرفر
    var engine = new HlsJsP2PEngine({
        core: {
            swarmId: "cosjzd7el0",
            announceTrackers: ["wss://hlspatch.net:3000"]
        }
    });

    var player = new Clappr.Player({
        source: src,
        parentId: "#player",
        width: "100%",
        height: "100%",
        autoPlay: true,
        mute: true, // البدء صامتاً لتجنب حظر المتصفحات للتشغيل التلقائي
        playback: {
            hlsjsConfig: {
                ...engine.getConfigForHlsJs(),
                maxBufferSize: 0,
                maxBufferLength: 12,
            },
        },
        events: {
            onError: function(e) {
                showOfflineMessage();
            },
            onPlay: function() {
                if (!videoStarted) {
                    videoStarted = true;
                    $("#btn-unmute").fadeIn();
                }
            }
        }
    });

    // ربط محرك P2P بالمشغل
    engine.bindHls(() => player.core.getCurrentPlayback()?._hls);

    // دالة التعامل مع توقف البث
    function showOfflineMessage() {
        $(".stream-offline").css("display", "block");
        var count = 20;
        if (WSreloadCounter) clearInterval(WSreloadCounter);
        WSreloadCounter = setInterval(function() {
            count--;
            $(".counter").text(count);
            if (count <= 0) {
                clearInterval(WSreloadCounter);
                location.reload();
            }
        }, 1000);
    }

    // زر إلغاء كتم الصوت
    $("#btn-unmute").click(function() {
        player.unmute();
        player.setVolume(100);
        $(this).fadeOut();
    });
</script>

</body>
</html>
